<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Podgląd kadrowania zdjęcia Tomka</title>
<style>
:root{--bg:#090e19;--card:#12234d;--gold:#e8c84a;--green:#3ecf6e}
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at top,#203664,transparent 45%),var(--bg);font-family:Arial,sans-serif;color:#fff}
.wrap{text-align:center;padding:35px}.wrap h1{font-size:25px;margin:0 0 8px}.wrap p{color:#8fa0b9;margin:0 0 30px}
.compare{display:flex;gap:34px;justify-content:center;flex-wrap:wrap}
.sample h2{font-size:13px;text-transform:uppercase;letter-spacing:.12em;color:#8fa0b9;margin:0 0 10px}
.card{position:relative;width:170px;height:230px;overflow:hidden;border-radius:13px;background:linear-gradient(160deg,#0a1628,#0d1f45 45%,#111b3a);box-shadow:0 0 0 2px rgba(62,207,110,.65),0 12px 30px rgba(0,0,0,.45)}
.card:before{content:"";position:absolute;inset:2px;border:1px solid rgba(180,210,255,.22);border-radius:11px}.top{position:absolute;top:10px;left:11px;color:var(--gold);font-weight:800;font-size:18px}.year{display:block;color:#7791ba;font-size:8px;margin-top:1px}
.photo{position:absolute;top:45px;left:50%;width:104px;height:104px;transform:translateX(-50%);overflow:hidden;border-radius:50%;border:3px solid rgba(180,210,255,.4);box-shadow:0 4px 15px rgba(0,0,0,.55)}
.photo img{width:100%;height:100%;object-fit:cover;display:block}
.proposed img{width:116%;height:116%;max-width:none;transform:translate(-10%,-5%)}
.name{position:absolute;left:0;right:0;bottom:45px;text-align:center;font-size:17px;font-weight:800;letter-spacing:.06em}
.stats{position:absolute;left:10px;right:10px;bottom:13px;border-top:1px solid rgba(180,210,255,.2);padding-top:8px;color:var(--gold);font-size:14px}
.note{max-width:220px;margin:12px auto 0;color:#8fa0b9;font-size:12px;line-height:1.4}
</style>
</head>
<body>
<main class="wrap">
  <h1>Kadrowanie zdjęcia Tomka</h1>
  <p>Porównanie na powiększonej karcie</p>
  <div class="compare">
    <section class="sample">
      <h2>Obecnie</h2>
      <div class="card">
        <div class="top">MŚ<span class="year">2026</span></div>
        <div class="photo"><img src="img/tomek.jpg" alt="Tomek"></div>
        <div class="name">TOMEK</div><div class="stats">0 PKT</div>
      </div>
    </section>
    <section class="sample">
      <h2>Propozycja</h2>
      <div class="card">
        <div class="top">MŚ<span class="year">2026</span></div>
        <div class="photo proposed"><img src="img/tomek.jpg" alt="Tomek"></div>
        <div class="name">TOMEK</div><div class="stats">0 PKT</div>
      </div>
      <div class="note">Delikatne powiększenie i przesunięcie twarzy do środka kadru.</div>
    </section>
  </div>
</main>
</body>
</html>
