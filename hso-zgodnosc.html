<body>
<main class="compat-wrap">
  <header class="compat-hero">
    <div>
      <p class="eyebrow">LOŻA EKSPERTÓW · MŚ 2026</p>
      <h1>Ranking zgodności</h1>
      <p class="lead">Sprawdź, kto typował najbardziej podobnie. Identyczny wynik dawał pełną zgodność, a ten sam kierunek meczu — częściową.</p>
    </div>
    <a class="back-btn" href="hso.html">← Wróć</a>
  </header>

  <section class="control-panel">
    <label class="player-picker">
      <span>Gracz</span>
      <select id="compatPlayer" aria-label="Wybierz gracza"></select>
    </label>
    <div class="phase-filters" id="phaseFilters" role="group" aria-label="Zakres typów">
      <button class="phase-filter active" type="button" data-phase="all">Wszystkie</button>
      <button class="phase-filter" type="button" data-phase="group">Faza grupowa</button>
      <button class="phase-filter" type="button" data-phase="knockout">Faza pucharowa</button>
      <button class="phase-filter" type="button" data-phase="champ">Typ mistrza</button>
    </div>
  </section>

  <section class="compat-summary" id="compatSummary" aria-live="polite"></section>
  <section class="compat-ranking" id="compatRanking" aria-live="polite"></section>

  <footer class="method-note">
    <strong>Jak liczymy?</strong>
    <span>Identyczny wynik: 2 pkt · ten sam zwycięzca lub remis: 1 pkt · inne wskazanie: 0 pkt.</span>
  </footer>
</main>

<script>window.HSO_CONFIG={mode:'compatibility'};</script>
