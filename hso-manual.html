<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=hso.html">
  <title>Loza Ekspertow - wersja automatyczna</title>
  <meta name="robots" content="noindex">
  <style>
    :root {
      --bg: #080f1e;
      --card: #172238;
      --gold: #f5c84c;
      --text: #f7f8fb;
      --muted: #94a3b8;
      --border: rgba(255,255,255,.12);
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text);
      background:
        radial-gradient(circle at 80% 0%, rgba(46,91,170,.25), transparent 34%),
        linear-gradient(160deg, #101a31, var(--bg));
      font-family: Arial, sans-serif;
    }
    main {
      width: min(520px, 100%);
      padding: 28px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(23,34,56,.92);
      box-shadow: 0 18px 45px rgba(0,0,0,.35);
    }
    h1 {
      margin: 0 0 10px;
      color: var(--gold);
      font-size: 28px;
      line-height: 1.1;
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.55;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 10px;
      background: var(--gold);
      color: #17120a;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
  <script>
    window.location.replace('hso.html');
  </script>
</head>
<body>
  <main>
    <h1>Wersja reczna zostala wygaszona</h1>
    <p>Serwis korzysta teraz z wersji automatycznej opartej o API. Za chwile nastapi przekierowanie.</p>
    <a href="hso.html">Przejdz do hso.html</a>
  </main>
</body>
</html>
