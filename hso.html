<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Loża Ekspertów · MŚ 2026</title>
<meta name="description" content="Typy, mecze i ranking Loży Ekspertów podczas Mistrzostw Świata 2026.">
<meta property="og:title" content="Loża Ekspertów · MŚ 2026">
<meta property="og:description" content="Typy graczy, terminarz meczów i ranking aktualizowany po każdym spotkaniu.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://amwojnar-ops.github.io/ms2026/hso.html">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0b0f1a;
  --surface:   #131929;
  --card:      #1a2235;
  --border:    rgba(255,255,255,.08);
  --gold:      #e8b84b;
  --gold-dim:  rgba(232,184,75,.15);
  --green:     #3ecf6e;
  --green-dim: rgba(62,207,110,.12);
  --red:       #e85656;
  --red-dim:   rgba(232,86,86,.12);
  --amber:     #f0a030;
  --amber-dim: rgba(240,160,48,.12);
  --text:      #e8edf5;
  --muted:     #7a8aa0;
  --r:         10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  font-size: 15px;
  line-height: 1.5;
  min-height: 100vh;
}
body.intro-active { overflow: hidden; }

/* intro Loza Ekspertow */
.site-intro {
  position: fixed; z-index: 1000; inset: 0;
  display: grid; place-items: center; overflow: hidden;
  background: #060a12;
  transition: opacity .65s ease, visibility .65s ease, transform .65s ease;
}
.site-intro.hidden { opacity: 0; visibility: hidden; transform: scale(1.035); pointer-events: none; }
.site-intro::before {
  content: ''; position: absolute; inset: -30%;
  background:
    radial-gradient(circle at 50% 45%, rgba(39,72,145,.45), transparent 32%),
    linear-gradient(115deg, transparent 38%, rgba(232,184,75,.05) 48%, transparent 58%);
  animation: intro-atmosphere 2.6s ease-out both;
}
.intro-pitch {
  position: absolute; inset: 0; opacity: .2;
  background:
    linear-gradient(90deg, transparent 49.8%, rgba(255,255,255,.14) 50%, transparent 50.2%),
    repeating-linear-gradient(0deg, transparent, transparent 55px, rgba(255,255,255,.05) 56px);
  transform: perspective(500px) rotateX(65deg) scale(1.5);
  transform-origin: center bottom;
}
.intro-brand {
  position: relative; text-align: center;
  transform: scale(.72); opacity: 0;
  animation: intro-brand-in .55s cubic-bezier(.17,.84,.44,1) .12s forwards;
}
.intro-title {
  position: relative;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(86px,22vw,190px); font-weight: 700; line-height: .75;
  letter-spacing: .04em; color: #fff;
  text-shadow: 0 0 42px rgba(110,160,255,.22);
  overflow: hidden;
}
.intro-title::after {
  content: ''; position: absolute; inset: -15% -30%;
  background: linear-gradient(105deg, transparent 42%, rgba(255,255,255,.95) 49%, rgba(232,184,75,.85) 51%, transparent 58%);
  mix-blend-mode: screen; transform: translateX(-80%);
  animation: intro-shine .55s ease .75s forwards;
}
.intro-name {
  margin: 22px 0 0; padding-left: .12em;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(24px,6vw,46px); font-weight: 600; line-height: 1;
  letter-spacing: .12em; color: var(--gold);
  opacity: 0; animation: intro-fade-up .35s ease .48s forwards;
}
.intro-year {
  margin-top: 17px;
  font-size: clamp(15px,3vw,22px); font-weight: 500;
  letter-spacing: .18em; text-transform: uppercase; color: #aab7ca;
  opacity: 0; animation: intro-fade-up .35s ease .68s forwards;
}
.intro-line {
  width: 0; height: 2px; margin: 21px auto 0;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  box-shadow: 0 0 16px var(--gold);
  animation: intro-line-in .5s ease .9s forwards;
}
.intro-skip {
  position: absolute; right: 22px; bottom: 20px;
  border: 1px solid rgba(255,255,255,.18); border-radius: 99px;
  background: rgba(255,255,255,.04); color: #aab7ca;
  padding: 8px 14px; font: 500 12px 'Barlow', sans-serif; cursor: pointer;
  opacity: 0; animation: intro-fade-up .3s ease .95s forwards;
}
@keyframes intro-brand-in { to { opacity: 1; transform: scale(1); } }
@keyframes intro-fade-up { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
@keyframes intro-shine { to { transform: translateX(80%); } }
@keyframes intro-line-in { to { width: min(430px,72vw); } }
@keyframes intro-atmosphere { from { transform: scale(.8); opacity: 0; } to { transform: scale(1.08); opacity: 1; } }

/* ── murawa: siatka boiskowa ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    repeating-linear-gradient(0deg,   transparent, transparent 39px, rgba(255,255,255,.06) 40px),
    repeating-linear-gradient(90deg,  transparent, transparent 39px, rgba(255,255,255,.06) 40px);
  pointer-events: none; z-index: 0;
}

/* ── reflektory stadionowe w rogach ── */
body::after {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 0% 0%,   rgba(140,180,255,.18) 0%, transparent 65%),
    radial-gradient(ellipse 60% 50% at 100% 0%,  rgba(140,180,255,.18) 0%, transparent 65%),
    radial-gradient(ellipse 45% 35% at 0% 100%,  rgba(100,140,255,.10) 0%, transparent 65%),
    radial-gradient(ellipse 45% 35% at 100% 100%,rgba(100,140,255,.10) 0%, transparent 65%);
  pointer-events: none; z-index: 0;
}

.wrap { max-width: 780px; margin: 0 auto; padding: 0 16px 80px; position: relative; z-index: 1; }

/* ── header z gradientem nieba ── */
header {
  position: relative;
  padding: 36px 0 28px;
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-bottom: 24px;
  gap: 16px;
  overflow: hidden;
}
.lang-switch {
  position: absolute; top: 4px; right: 0; z-index: 3;
  min-width: 42px; padding: 5px 10px;
  border: 1px solid rgba(232,184,75,.35); border-radius: 7px;
  background: rgba(11,15,26,.65); color: var(--gold);
  font: 700 11px 'Barlow', sans-serif; letter-spacing: .08em;
  cursor: pointer; transition: background .15s, color .15s;
}
.lang-switch:hover { background: var(--gold); color: #241700; }

/* gradient nieba — granatowo-fioletowe wieczorne niebo nad stadionem */
header::before {
  content: '';
  position: absolute;
  inset: -40px -60px 0;
  background: linear-gradient(160deg,
    #2a0a5a 0%,
    #121e5a 30%,
    #0b1a3a 60%,
    transparent 100%);
  border-radius: 0 0 60% 0;
  opacity: .75;
  pointer-events: none;
  z-index: 0;
}

/* złota linia pod nagłówkiem */
header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg,
    var(--gold) 0%,
    rgba(232,184,75,.3) 40%,
    transparent 70%);
}

.header-title {
  position: relative; z-index: 1;
}
.header-title h1 {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(36px, 8vw, 64px);
  font-weight: 700;
  letter-spacing: 1px;
  line-height: 1;
  color: #fff;
  text-shadow: 0 0 40px rgba(120,160,255,.2);
}
.header-title h1 span { color: var(--gold); }
.header-title p { font-size: 13px; color: var(--muted); font-weight: 300; margin-top: 6px; }
.lock-badge {
  position: relative; z-index: 1;
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 500;
  color: var(--red); background: var(--red-dim);
  padding: 6px 12px; border-radius: var(--r);
  border: 1px solid rgba(232,86,86,.3);
  white-space: nowrap;
  flex-shrink: 0;
}

/* ── stat cards ── */
.stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 24px; }
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px 16px;
}
.stat-card .lbl { font-size: 11px; color: var(--muted); font-weight: 500; letter-spacing: .04em; text-transform: uppercase; margin-bottom: 6px; }
.stat-card .val { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 700; color: #fff; line-height: 1; }
.stat-card .val.leaders { font-size: 16px; line-height: 1.25; overflow-wrap: anywhere; }
.stat-card .val.sm { font-size: 14px; font-weight: 400; color: var(--text); font-family: 'Barlow', sans-serif; line-height: 1.4; margin-top: 2px; }
.stat-card.gold-accent { border-color: rgba(232,184,75,.3); }
.stat-card.gold-accent .val { color: var(--gold); }
.live-summary { display: block; margin-top: 4px; }
.live-summary-status {
  display: flex; align-items: center; gap: 6px;
  color: var(--green); font-size: 11px; font-weight: 600;
  margin-bottom: 6px;
}
.live-summary-match {
  display: block; color: #fff; font-size: 12px; line-height: 1.35;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── tabs ── */
.tabs {
  display: flex; gap: 2px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 4px;
  margin-bottom: 24px;
}
.tab {
  flex: 1; padding: 9px 12px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px; font-weight: 600; letter-spacing: .5px;
  border: none; background: none; color: var(--muted);
  border-radius: 7px; cursor: pointer;
  transition: all .2s;
}
.tab:hover { color: var(--text); background: rgba(255,255,255,.04); }
.tab.active { background: var(--card); color: #fff; }
.tab.disabled {
  position: relative; color: rgba(122,138,160,.5); cursor: not-allowed;
}
.tab.disabled:hover { color: rgba(122,138,160,.5); background: none; }
.tab.disabled::after {
  content: attr(data-coming); display: inline-block; margin-left: 5px;
  padding: 1px 5px; border-radius: 99px;
  font-family: 'Barlow', sans-serif; font-size: 7px; font-weight: 600;
  letter-spacing: .04em; text-transform: uppercase;
  color: var(--gold); background: var(--gold-dim);
  border: 1px solid rgba(232,184,75,.22);
  vertical-align: 2px;
}

/* ── kolory grup ── */
:root {
  --ga: #3ecf6e; --gb: #4a9eff; --gc: #f0a030; --gd: #e85656;
  --ge: #b06cff; --gf: #00d4c8; --gg: #ff6eb0; --gh: #ffcc00;
  --gi: #ff8c42; --gj: #5ce65c; --gk: #40c8ff; --gl: #ff5c8a;
}

/* ── subtabs (wg grup / wg dat) ── */
.subtabs {
  display: flex; gap: 6px;
  margin-bottom: 18px;
}
.subtab {
  padding: 6px 16px; font-size: 13px; font-weight: 500;
  border: 1px solid var(--border); border-radius: 99px;
  background: none; color: var(--muted); cursor: pointer;
  transition: all .15s;
}
.subtab:hover { color: var(--text); border-color: rgba(255,255,255,.2); }
.subtab.active { background: var(--card); color: #fff; border-color: rgba(232,184,75,.4); }
.section-lbl {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; font-weight: 600; letter-spacing: .1em;
  text-transform: uppercase; color: var(--muted);
  margin: 20px 0 10px;
  display: flex; align-items: center; gap: 8px;
}
.section-lbl::before {
  content: '';
  display: inline-block;
  width: 3px; height: 14px;
  border-radius: 2px;
  background: var(--g-color, var(--muted));
  flex-shrink: 0;
}
.section-lbl:first-child { margin-top: 0; }

/* ── match tiles ── */
.tiles-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 4px; }

.tile {
  background: var(--card);
  border: 1px solid var(--border);
  border-left: 3px solid var(--g-color, var(--border));
  border-radius: var(--r);
  padding: 14px 16px;
  transition: border-color .2s, transform .2s, box-shadow .2s;
}
.tile:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,.35);
}
.tile.done { cursor: pointer; }
.tile.done:hover { border-color: var(--g-color, rgba(255,255,255,.18)); }
.tile.done.expanded { border-color: rgba(232,184,75,.6); }
.tile.live { border-color: rgba(232,86,86,.7); }
.tile.upcoming { opacity: .65; }

.tile-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.tile-status { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 500; letter-spacing: .03em; }
.dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.dot-done { background: var(--red); }
.dot-live { background: var(--green); animation: blink 1.2s ease-in-out infinite; }
.dot-soon { background: var(--amber); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

.tile-teams { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; }
.t-name { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
.t-name.away { text-align: right; }
.t-score { display: flex; align-items: center; gap: 5px; }
.t-score span {
  font-family: 'Courier New', 'Lucida Console', monospace;
  font-size: 30px; font-weight: 700; color: #fff;
  min-width: 22px; text-align: center; line-height: 1;
  text-shadow: 0 0 12px rgba(255,255,255,.25);
}
.t-score .sep { font-size: 20px; color: var(--muted); font-family: 'Barlow Condensed', sans-serif; }
.t-vs { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; color: var(--muted); font-weight: 600; text-align: center; letter-spacing: .05em; }
.t-live-badge { font-size: 11px; font-weight: 600; color: var(--green); background: var(--green-dim); padding: 3px 8px; border-radius: 5px; text-align: center; }

.tile-footer {
  margin-top: 10px; padding-top: 10px;
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  font-size: 11px; color: var(--muted);
}
.f3 { color: var(--green); font-weight: 600; }
.f1 { color: var(--amber); font-weight: 600; }
.f-hint { color: var(--muted); opacity: .7; font-size: 11px; }

/* tile expand */
.tile-expand { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
.tile-expand.open { display: block; }
.exp-section { margin-bottom: 10px; }
.exp-section:last-child { margin-bottom: 0; }
.exp-lbl { font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 6px; }
.lbl-g { color: var(--green); }
.lbl-a { color: var(--amber); }
.lbl-r { color: var(--red); }
.chips { display: flex; flex-wrap: wrap; gap: 5px; }
.chip { font-size: 11px; padding: 3px 9px; border-radius: 99px; display: flex; align-items: center; gap: 5px; }
.chip-tip { font-size: 10px; opacity: .65; }
.chip-tip-pre  { background: rgba(232,184,75,.12); color: #fff; border: 1px solid rgba(232,184,75,.25); }
.chip-tip-empty{ background: rgba(255,255,255,.04); color: var(--muted); border: 1px solid var(--border); }
.chip-pname { font-weight: 500; }
.chip-g { background: var(--green-dim); color: var(--green); border: 1px solid rgba(62,207,110,.25); }
.chip-a { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(240,160,48,.25); }
.chip-r { background: rgba(255,255,255,.05); color: var(--muted); border: 1px solid var(--border); }

/* ── ranking ── */
.ranking-wrap { display: grid; grid-template-columns: 1fr; gap: 0; }
.ranking-wrap.panel-open { grid-template-columns: 1fr 230px; gap: 14px; }

.rank-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
.rank-table th {
  text-align: left; padding: 8px 10px;
  font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
  color: var(--muted); border-bottom: 1px solid var(--border);
}
.rank-table td { padding: 10px 10px; border-bottom: 1px solid var(--border); }
.rank-table tr:last-child td { border-bottom: none; }
.rank-table tr.row { cursor: pointer; transition: background .15s; }
.rank-table tr.row:hover td { background: rgba(255,255,255,.03); }
.rank-table tr.row.hi td { background: var(--gold-dim); }
.rank-table tr.expand-tr { display: none; }
.rank-table tr.expand-tr.open { display: table-row; }
.rank-table tr.expand-tr td { padding: 0; border-bottom: 1px solid var(--border); }
.expand-inner { padding: 12px 14px; background: rgba(255,255,255,.02); }

.pos {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px; font-weight: 700;
  width: 28px; height: 28px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 6px;
}
.pos-1 {
  background: linear-gradient(135deg, #c8960a, #f5d060);
  color: #3a2400;
  box-shadow: 0 2px 8px rgba(200,150,10,.4);
}
.pos-2 {
  background: linear-gradient(135deg, #7a8fa0, #c8d8e8);
  color: #1a2530;
  box-shadow: 0 2px 8px rgba(120,160,200,.3);
}
.pos-3 {
  background: linear-gradient(135deg, #8b4c1a, #d4895a);
  color: #2a1000;
  box-shadow: 0 2px 8px rgba(180,100,40,.3);
}
.rank-table tr.row:hover td.pos-1,
.rank-table tr.row.hi td.pos-1 {
  background: linear-gradient(135deg, #c8960a, #f5d060);
}
.rank-table tr.row:hover td.pos-2,
.rank-table tr.row.hi td.pos-2 {
  background: linear-gradient(135deg, #7a8fa0, #c8d8e8);
}
.rank-table tr.row:hover td.pos-3,
.rank-table tr.row.hi td.pos-3 {
  background: linear-gradient(135deg, #8b4c1a, #d4895a);
}
.pos-n { color: var(--muted); font-size: 14px; }
.p-name { font-weight: 500; color: #fff; }
.p-num { text-align: center; color: var(--muted); font-size: 13px; }
.p-pts { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; text-align: right; color: #fff; }
.p-chg { text-align: center; font-size: 12px; }
.up { color: var(--green); } .dn { color: var(--red); } .eq { color: var(--muted); }

/* side panel */
.side-panel {
  display: none;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  align-self: start;
}
.side-panel.open { display: block; }
.sp-head {
  background: var(--surface);
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: flex-start;
}
.sp-head h3 { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; color: #fff; }
.sp-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.sp-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; line-height: 1; padding: 2px; }
.sp-champ { padding: 8px 14px; font-size: 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
.sp-champ span { color: var(--muted); }
.sp-champ strong { color: var(--gold); }
.sp-hdr {
  display: grid; grid-template-columns: 38px 1fr 34px 52px;
  gap: 4px; padding: 6px 14px;
  font-size: 10px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase;
  color: var(--muted); background: var(--surface); border-bottom: 1px solid var(--border);
}
.sp-matches { max-height: 420px; overflow-y: auto; }
.sp-match {
  display: grid; grid-template-columns: 38px 1fr 34px 52px;
  gap: 4px; padding: 7px 14px;
  font-size: 11px; border-bottom: 1px solid var(--border);
  align-items: center;
}
.sp-match:last-child { border-bottom: none; }
.sp-date { color: var(--muted); }
.sp-teams { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sp-res { text-align: center; font-weight: 600; font-size: 13px; }
.sp-tip { text-align: center; }
.sp-p3 { color: var(--green); font-weight: 600; }
.sp-p1 { color: var(--amber); font-weight: 600; }
.sp-p0 { color: var(--red); }
.sp-pq { color: var(--muted); }

/* admin panel */
.admin-panel { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
.admin-row {
  display: grid; grid-template-columns: 1fr 72px 88px 80px;
  gap: 8px; align-items: center;
  padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 13px;
}
.admin-row:last-child { border-bottom: none; }
.admin-row:hover { background: rgba(255,255,255,.02); }
.admin-row input {
  padding: 6px 8px; font-size: 14px; text-align: center;
  border: 1px solid var(--border); border-radius: 6px;
  background: var(--surface); color: var(--text);
  font-family: 'Barlow Condensed', sans-serif; font-weight: 600;
  width: 100%; transition: border-color .15s;
}
.admin-row input:focus { outline: none; border-color: var(--gold); }

function switchLanguage(){
  LANG=LANG==='pl'?'en':'pl';
  try{localStorage.setItem('hso_lang',LANG);}catch(e){}
  const url=new URL(location.href);
  if(LANG==='en')url.searchParams.set('lang','en'); else url.searchParams.delete('lang');
  history.replaceState(null,'',url);
  closePanel();
  closePlayerPanel();
  applyLanguage();
  renderPlayerCards();
  renderMatches();
  renderRanking();
}
document.getElementById('langSwitch').addEventListener('click',switchLanguage);

function flag(t){

  if(!code)return '';
  return `<img src="img/flags/${code}.png" width="16" height="12" alt="${teamName(t)}" style="vertical-align:middle;border-radius:2px;margin:0 2px">`;
}
function disp(t){ return LANG==='en' ? teamName(t) : (SHORT[t]||t); }
function teamHTML(t, side='home'){
  const f=flag(t), d=disp(t);
  return side==='home'
    ? `${f} ${d}`
    : `${d} ${f}`;
}

function sc(t,r){
  if(!r||!t)return null;if(t===r)return 3;
  const[th,ta]=t.split('-').map(Number),[rh,ra]=r.split('-').map(Number);
  if(isNaN(th)||isNaN(rh))return null;
  const s=x=>x>0?1:x<0?-1:0;return s(th-ta)===s(rh-ra)?1:0;
}
function calcAll(resultSet=results){
  return PLAYERS.map(p=>{
    let pts=0,ex=0,en=0;
    resultSet.forEach((r,i)=>{const s=sc(p.tips[i+1],r);if(s===3){pts+=3;ex++;}else if(s===1){pts+=1;en++;}});
    return{...p,pts,ex,en};
  }).sort((a,b)=>{
    if(b.pts!==a.pts) return b.pts-a.pts;           // 1. punkty
    if(b.ex!==a.ex)  return b.ex-a.ex;              // 2. dokładne wyniki (3 pkt)
    return a.name.localeCompare(b.name,'pl');         // 3. alfabetycznie
  });
}
function assignPositions(ranked){
  ranked.forEach((p,i)=>{
    if(i===0) p._pos=1;
    else {
      const prev=ranked[i-1];
      p._pos=(p.pts===prev.pts && p.ex===prev.ex) ? prev._pos : i+1;
    }
  });
  return ranked;
}
function latestCompletedIndex(){
  let latest=-1,latestTime=-Infinity;
  results.forEach((r,i)=>{
    if(!r)return;
    const time=matchDateTime(MATCHES[i]).getTime();
    if(time>latestTime){latestTime=time;latest=i;}
  });
  return latest;
}
function rankingMovement(){
  const latest=latestCompletedIndex();
  if(latest<0)return {};
  const previousResults=results.map((r,i)=>i===latest?null:r);
  const previous=assignPositions(calcAll(previousResults));
  return Object.fromEntries(previous.map(p=>[p.name,p._pos]));
}
function playerStats(p){
  const playedIndexes=results.map((r,i)=>r?i:-1).filter(i=>i>=0)
    .sort((a,b)=>matchDateTime(MATCHES[a])-matchDateTime(MATCHES[b]));
  let scored=0,pts=0,streak=0,bestStreak=0;
  const groupPts={};
  playedIndexes.forEach(i=>{
    const value=sc(p.tips[i+1],results[i])??0;
    pts+=value;
    if(value>0){scored++;streak++;bestStreak=Math.max(bestStreak,streak);}
    else streak=0;
    groupPts[MATCHES[i].g]=(groupPts[MATCHES[i].g]||0)+value;
  });
  const bestGroup=Object.entries(groupPts).sort((a,b)=>b[1]-a[1]||a[0].localeCompare(b[0]))[0];
  return {
    efficiency:playedIndexes.length?Math.round(scored/playedIndexes.length*100):0,
    average:playedIndexes.length?(pts/playedIndexes.length).toFixed(2).replace('.',LANG==='pl'?',':'.'):(LANG==='pl'?'0,00':'0.00'),
    bestGroup:bestGroup&&bestGroup[1]>0?`${tr('group')} ${bestGroup[0]}`:'—',
    streak,
    bestStreak
  };
}
function breakdown(idx){
  const r=results[idx];if(!r)return null;
  const g={3:[],1:[],0:[]};
  PLAYERS.forEach(p=>{const s=sc(p.tips[idx+1],r);g[s===3?3:s===1?1:0].push({name:p.name,tip:p.tips[idx+1]||'—'});});
  [3,1,0].forEach(k=>g[k].sort((a,b)=>a.name.localeCompare(b.name,'pl')));
  return g;
}
let _rotateTimer = null;
let _rotateIdx   = 0;
let _countdownTimer = null;
let _countdownMatch = null;

// Parsuje datę meczu (DD.MM, HH:MM) do obiektu Date w CEST (UTC+2)
function matchDateTime(m){
  const [d, mo] = m.date.split('.').map(Number);
  const [h, mi] = m.time.split(':').map(Number);
  // CEST = UTC+2 → odejmujemy 2h żeby dostać UTC
  return new Date(Date.UTC(2026, mo-1, d, h-2, mi, 0));
}
function matchStatus(m,idx){
  if(results[idx])return 'done';
  const diff=Date.now()-matchDateTime(m).getTime();
  if(diff>=0 && diff<3*60*60*1000)return 'live';
  if(diff>=3*60*60*1000)return 'waiting';
  return 'soon';
}

// Formatuje pozostały czas do meczu
function formatCountdown(ms){
  if(ms <= 0) return null;
  const totalSec = Math.floor(ms / 1000);
  const days  = Math.floor(totalSec / 86400);
  const hours = Math.floor((totalSec % 86400) / 3600);
  const mins  = Math.floor((totalSec % 3600) / 60);
  const secs  = totalSec % 60;
  const pad   = n => String(n).padStart(2,'0');
  if(days > 0)
    return `<span style="color:var(--gold)">${days}d ${pad(hours)}h ${pad(mins)}m ${pad(secs)}s</span>`;
  if(hours > 0)
    return `<span style="color:var(--amber)">${pad(hours)}h ${pad(mins)}m ${pad(secs)}s</span>`;
  return `<span style="color:var(--green)">${pad(mins)}m ${pad(secs)}s</span>`;
}

function nextMatchHTML(m){
  if(matchStatus(m,m.idx)==='live'){
    return `<span class="live-summary">
      <span class="live-summary-status"><span class="dot dot-live"></span>${tr('live')}</span>
      <span class="live-summary-match">${flag(m.home)} ${disp(m.home)} – ${disp(m.away)} ${flag(m.away)}</span>
    </span>`;
  }
  const dt = matchDateTime(m);
  const diff = dt - Date.now();
  const countdown = diff > 0 ? formatCountdown(diff) : null;
  return `<span style="display:block;font-size:13px;font-weight:500;color:#fff;line-height:1.3">${m.date} · ${m.time}</span>`
       + `<span style="display:block;font-size:12px;color:var(--muted);margin-top:2px;line-height:1.3">${flag(m.home)} ${disp(m.home)} – ${disp(m.away)} ${flag(m.away)}</span>`
       + (countdown ? `<span id="countdown-tick" style="display:block;font-size:11px;font-weight:500;margin-top:4px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px">⏱ ${countdown}</span>` : '');
}

function tickCountdown(){
  const el = document.getElementById('countdown-tick');
  if(!el || !_countdownMatch) return;
  const dt = matchDateTime(_countdownMatch);
  const diff = dt - Date.now();
  const countdown = diff > 0 ? formatCountdown(diff) : null;
  if(countdown) el.innerHTML = `⏱ ${countdown}`;
  else el.remove();
}

function nextMatch(){
  // Znajdź "następne" mecze — live lub najbliższe soon
  const indexed=MATCHES.map((m,idx)=>({...m,idx,status:matchStatus(m,idx)}));
  const live = indexed.filter(m=>m.status==='live');
  if(live.length){
    document.getElementById('nextMatchLabel').textContent=live.length>1
      ? (LANG==='pl'?'Mecze trwają':'Matches live')
      : (LANG==='pl'?'Mecz trwa':'Match live');
    startRotation(live);
    _countdownMatch = null;
    stopCountdown();
    return nextMatchHTML(live[0]);
  }
  document.getElementById('nextMatchLabel').textContent=tr('nextMatch');
  const soon = indexed.filter(m=>m.status==='soon').sort((a,b)=>matchDateTime(a)-matchDateTime(b));
  if(!soon.length){ stopRotation(); stopCountdown(); return '—'; }
  // Grupuj po dacie+godzinie — weź pierwsze (najwcześniejsze)
  const firstTime = soon[0].date + soon[0].time;
  const group = soon.filter(m=> m.date+m.time === firstTime);
  startRotation(group);
  _countdownMatch = group[0];
  startCountdown();
  return nextMatchHTML(group[0]);
}

function startRotation(group){
  stopRotation();
  if(group.length <= 1) return;
  _rotateIdx = 0;
  _rotateTimer = setInterval(()=>{
    _rotateIdx = (_rotateIdx + 1) % group.length;
    const el = document.getElementById('s-next');
    if(el){
      el.style.opacity='0';
      setTimeout(()=>{
        el.innerHTML = nextMatchHTML(group[_rotateIdx]);
        el.style.opacity='1';
      }, 200);
    }
  }, 3000);
}

function stopRotation(){
  if(_rotateTimer){ clearInterval(_rotateTimer); _rotateTimer=null; }
}

function startCountdown(){
  stopCountdown();
  _countdownTimer = setInterval(tickCountdown, 1000);
}

function stopCountdown(){
  if(_countdownTimer){ clearInterval(_countdownTimer); _countdownTimer=null; }
}

function buildSpRows(p){
  let h='';
  results.forEach((r,i)=>{
    if(!r)return;
    const m=MATCHES[i],t=p.tips[i+1]||'—',s=sc(t,r);
    const cls=s===3?'sp-p3':s===1?'sp-p1':s===0?'sp-p0':'sp-pq';
    const lbl=s===3?`3 ${pointsLabel(3)}`:s===1?`1 ${pointsLabel(1)}`:s===0?`0 ${pointsLabel(0)}`:'?';
    h+=`<div class="sp-match">
      <span class="sp-date">${m.date}</span>
      <span class="sp-teams">${flag(m.home)} ${disp(m.home)}–${disp(m.away)} ${flag(m.away)}</span>
      <span class="sp-res">${r}</span>
      <span class="${cls}">${t} / ${lbl}</span>
    </div>`;
  });
  return h;
}
function buildExpRows(p){
  let h=`<div class="exp-match-row hdr"><span>${tr('date')}</span><span>${tr('match')}</span><span style="text-align:center">${tr('result')}</span><span style="text-align:center">${tr('predictionPoints')}</span></div>`;
  results.forEach((r,i)=>{
    if(!r)return;
    const m=MATCHES[i],t=p.tips[i+1]||'—',s=sc(t,r);
    const cls=s===3?'ep3':s===1?'ep1':s===0?'ep0':'ep-muted';
    const lbl=s===3?`3 ${pointsLabel(3)}`:s===1?`1 ${pointsLabel(1)}`:s===0?`0 ${pointsLabel(0)}`:'?';
    h+=`<div class="exp-match-row">
      <span style="color:var(--muted)">${m.date}</span>
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${flag(m.home)} ${disp(m.home)}–${disp(m.away)} ${flag(m.away)}</span>
      <span class="em-res">${r}</span>
      <span class="${cls}">${t} / ${lbl}</span>
    </div>`;
  });
  return h;
}

function openPanel(name,ranked){
  const p=ranked.find(x=>x.name===name);
  activePlayer=name;
  if(isMobile()){
    document.querySelectorAll('.expand-tr.open').forEach(r=>r.classList.remove('open'));
    const exp=document.getElementById('exp-'+name);
    if(exp){
      exp.classList.add('open');
      document.getElementById('exp-in-'+name).innerHTML=
        `<div class="exp-champ-line">${tr('champion')}: <strong>${p.champ?teamName(p.champ):'—'}</strong> &nbsp;·&nbsp; ${p.pts} ${pointsLabel(p.pts)} (${p.ex}×3 + ${p.en}×1)</div>`
        +buildExpRows(p);
    }
  } else {
    document.getElementById('spName').textContent=name;
    document.getElementById('spSub').textContent=`${p.pts} ${pointsLabel(p.pts)} · ${p.ex}× 3 ${pointsLabel(3)} + ${p.en}× 1 ${pointsLabel(1)}`;
    document.getElementById('spChamp').textContent=p.champ?teamName(p.champ):'—';
    document.getElementById('spMatches').innerHTML=buildSpRows(p);
    document.getElementById('sidePanel').classList.add('open');
    document.getElementById('rankingWrap').classList.add('panel-open');
  }
  document.querySelectorAll('#rankingBody tr.row').forEach(tr=>
    tr.classList.toggle('hi',tr.dataset.name===name));
}
function closePanel(){
  activePlayer=null;
  document.getElementById('sidePanel').classList.remove('open');
  document.getElementById('rankingWrap').classList.remove('panel-open');
  document.querySelectorAll('.expand-tr.open').forEach(r=>r.classList.remove('open'));
  document.querySelectorAll('#rankingBody tr').forEach(tr=>tr.classList.remove('hi'));
}

function renderRanking(){
  const ranked=assignPositions(calcAll());
  const previousPositions=rankingMovement();
  const played=results.filter(Boolean).length;
  const leaderPts=ranked[0]?.pts;
  const leaders=played>0 ? ranked.filter(p=>p._pos===1) : [];
  const manyLeaders=leaders.length>1;
  const leaderNames=leaders.map(p=>p.name).join(', ');
  document.getElementById('s-played').textContent=`${played} / 72`;
  document.getElementById('s-leader-label').textContent=manyLeaders?tr('leaders'):tr('leader');
  document.getElementById('s-leadpts-label').textContent=manyLeaders?tr('leadersPoints'):tr('leaderPoints');
  const leaderEl=document.getElementById('s-leader');
  leaderEl.textContent=leaderNames||'—';
  leaderEl.classList.toggle('leaders',manyLeaders);
  document.getElementById('s-leadpts').textContent=played>0?leaderPts:'—';
  document.getElementById('s-next').innerHTML=nextMatch();

  const tbody=document.getElementById('rankingBody');tbody.innerHTML='';
  ranked.forEach((p,i)=>{
    const pos=p._pos;
    const pc=pos===1?'pos-1':pos===2?'pos-2':pos===3?'pos-3':'pos-n';
    const posLabel=String(pos);
    const previous=previousPositions[p.name];
    const movement=previous==null?0:previous-pos;
    const chg=movement>0?`<span class="up">▲${movement}</span>`:movement<0?`<span class="dn">▼${Math.abs(movement)}</span>`:`<span class="eq">—</span>`;
    const tr=document.createElement('tr');tr.className='row';tr.dataset.name=p.name;
    if(p.name===activePlayer)tr.classList.add('hi');
    tr.innerHTML=`<td class="pos ${pc}">${posLabel}</td>
      <td class="p-name">${p.name}</td>
      <td class="p-num">${p.ex}</td>
      <td class="p-num">${p.en}</td>
      <td class="p-num" style="font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.champ?teamName(p.champ):'—'}</td>
      <td class="p-pts">${p.pts}</td>
      <td class="p-chg">${chg}</td>`;
    tr.onclick=()=>activePlayer===p.name?closePanel():openPanel(p.name,ranked);
    tbody.appendChild(tr);
    const expTr=document.createElement('tr');expTr.className='expand-tr';expTr.id='exp-'+p.name;
    expTr.innerHTML=`<td colspan="7"><div class="expand-inner" id="exp-in-${p.name}"></div></td>`;
    tbody.appendChild(expTr);
  });
}

let _matchView = 'grupy';

function switchMatchView(view, el){
  _matchView = view;
  document.querySelectorAll('.subtab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');

function buildTile(m, gcVar){
  const r=results[m.idx];
  const status=matchStatus(m,m.idx);
  const tile=document.createElement('div');
  tile.className=`tile ${status}`;
  tile.style.setProperty('--g-color',`var(${gcVar||'--muted'})`);
  let sHTML='';
  if(status==='done')         sHTML=`<span class="dot dot-done"></span><span style="color:var(--red);font-weight:600">${tr('finished')}</span>`;
  else if(status==='live')    sHTML=`<span class="dot dot-live"></span><span style="color:var(--green);font-weight:600">${tr('live')}</span>`;
  else if(status==='waiting') sHTML=`<span class="dot dot-soon"></span><span style="color:var(--amber)">${tr('waiting')}</span>`;
  else                        sHTML=`<span class="dot dot-soon"></span><span style="color:var(--amber)">${tr('soon')} · ${m.date} ${m.time}</span>`;
  let scHTML='';
  if(r){const[h,a]=r.split('-');scHTML=`<div class="t-score"><span>${h}</span><span class="sep">–</span><span>${a}</span></div>`;}
  else if(status==='live') scHTML=`<div class="t-live-badge">${tr('live')}</div>`;
  else scHTML=`<div class="t-vs">VS</div>`;
  let fHTML='';
  if(status==='done'&&r){
    const bd=breakdown(m.idx);
    fHTML=`<span class="f3">▲ ${bd[3].length} × 3 ${pointsLabel(3)}</span><span class="f1">${bd[1].length} × 1 ${pointsLabel(1)}</span><span class="f-hint">↓</span>`;
  } else {
    const cnt=PLAYERS.filter(p=>p.tips[m.idx+1]).length;
    fHTML=`<span>${cnt}/${PLAYERS.length} ${tr('predictions')}</span><span class="f-hint">↓</span>`;
  }
  let dHTML='';
  if(status==='done'&&r){
    const bd=breakdown(m.idx);
    dHTML=`<div class="tile-expand" id="tx-${m.idx}">`;
    [{pts:3,cls:'lbl-g exp-lbl',label:`3 ${pointsLabel(3)}`,cc:'chip-g'},{pts:1,cls:'lbl-a exp-lbl',label:`1 ${pointsLabel(1)}`,cc:'chip-a'},{pts:0,cls:'lbl-r exp-lbl',label:`0 ${pointsLabel(0)}`,cc:'chip-r'}].forEach(({pts,cls,label,cc})=>{
      if(!bd[pts].length)return;
      dHTML+=`<div class="exp-section"><div class="${cls}">${label}</div><div class="chips">`;
      bd[pts].forEach(({name,tip})=>{dHTML+=`<span class="chip ${cc}">${name}<span class="chip-tip">${tip}</span></span>`;});
      dHTML+=`</div></div>`;
    });
    dHTML+=`</div>`;
  } else {
    dHTML=`<div class="tile-expand" id="tx-${m.idx}"><div class="exp-section"><div class="exp-lbl" style="color:var(--muted)">${tr('playerPredictions')}</div><div class="chips">`;
    const withTip=PLAYERS.filter(p=>p.tips[m.idx+1]).sort((a,b)=>a.name.localeCompare(b.name,'pl'));
    const noTip=PLAYERS.filter(p=>!p.tips[m.idx+1]).sort((a,b)=>a.name.localeCompare(b.name,'pl'));
    withTip.forEach(p=>{dHTML+=`<span class="chip chip-tip-pre"><span class="chip-pname">${p.name}</span><span class="chip-tip">${p.tips[m.idx+1]}</span></span>`;});
    noTip.forEach(p=>{dHTML+=`<span class="chip chip-tip-empty"><span class="chip-pname">${p.name}</span><span class="chip-tip">—</span></span>`;});
    dHTML+=`</div></div></div>`;
  }
  tile.innerHTML=`
    <div class="tile-top"><div class="tile-status">${sHTML}</div></div>
    <div class="tile-teams"><span class="t-name">${teamHTML(m.home,'home')}</span>${scHTML}<span class="t-name away">${teamHTML(m.away,'away')}</span></div>
    <div class="tile-footer">${fHTML}</div>${dHTML}`;
  tile.style.cursor='pointer';
  tile.addEventListener('click',()=>{
    const d=document.getElementById('tx-'+m.idx);if(!d)return;
    const op=d.classList.contains('open');
    document.querySelectorAll('.tile-expand.open').forEach(x=>x.classList.remove('open'));
    document.querySelectorAll('.tile.expanded').forEach(x=>x.classList.remove('expanded'));
    if(!op){d.classList.add('open');tile.classList.add('expanded');}
  });
  return tile;
}

function renderMatches(){
  const cont=document.getElementById('matches-content');
  if(!cont) return;
  cont.innerHTML='';
  const GC={A:'--ga',B:'--gb',C:'--gc',D:'--gd',E:'--ge',F:'--gf',G:'--gg',H:'--gh',I:'--gi',J:'--gj',K:'--gk',L:'--gl'};

  if(_matchView==='grupy'){
    const grouped={};
    MATCHES.forEach((m,i)=>{if(!grouped[m.g])grouped[m.g]=[];grouped[m.g].push({...m,idx:i});});
    Object.entries(grouped).forEach(([grp,ms])=>{
      const lbl=document.createElement('div');
      lbl.className='section-lbl';
      lbl.style.setProperty('--g-color',`var(${GC[grp]||'--muted'})`);
      lbl.textContent=`${tr('group')} ${grp}`;
      cont.appendChild(lbl);
      const grid=document.createElement('div');grid.className='tiles-grid';
      ms.forEach(m=>grid.appendChild(buildTile(m, GC[m.g])));
      cont.appendChild(grid);
    });
  } else {
    const byDate={};
    MATCHES.forEach((m,i)=>{if(!byDate[m.date])byDate[m.date]=[];byDate[m.date].push({...m,idx:i});});
    const months=LANG==='en'
      ? ['','January','February','March','April','May','June','July','August','September','October','November','December']
      : ['','stycznia','lutego','marca','kwietnia','maja','czerwca','lipca','sierpnia','września','października','listopada','grudnia'];
    const days=LANG==='en'
      ? ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday']
      : ['niedziela','poniedziałek','wtorek','środa','czwartek','piątek','sobota'];
    const sorted=Object.keys(byDate).sort((a,b)=>{
      const[da,ma]=a.split('.').map(Number),[db,mb]=b.split('.').map(Number);
      return (ma-mb)||(da-db);
    });
    sorted.forEach(date=>{
      const ms=byDate[date];
      const[d,mo]=date.split('.').map(Number);
      const dow=new Date(2026,mo-1,d).getDay();
      const lbl=document.createElement('div');
      lbl.className='section-lbl';
      lbl.style.setProperty('--g-color','rgba(255,255,255,.35)');
      lbl.textContent=`${d} ${months[mo]} · ${days[dow]}`;
      cont.appendChild(lbl);
      const grid=document.createElement('div');grid.className='tiles-grid';
      ms.sort((a,b)=>a.time.localeCompare(b.time));
      ms.forEach(m=>grid.appendChild(buildTile(m, GC[m.g])));
      cont.appendChild(grid);
    });
  }
}

let activePlayerCard = null;

function renderPlayerCards(){
  const grid = document.getElementById('playersGrid');
  grid.innerHTML = '';
  const ranked = assignPositions(calcAll());
  const sorted = [...ranked].sort((a, b) => a.name.localeCompare(b.name, 'pl'));
  const leaderPts = ranked[0] ? ranked[0].pts : 0;
  const hasResults = results.some(Boolean);

  sorted.forEach((rp, i) => {
    const p = PLAYERS.find(x => x.name === rp.name);
    if(!p) return;
    const card = document.createElement('div');
    const hasTips = p.tips && p.tips.filter((t,i) => i>0 && t && t!=='').length === 72;
    const isLeader = hasResults && rp._pos === 1;
    card.className = 'fifa-card' + (isLeader ? ' leader' : '') + (hasTips ? ' has-tips' : '');
    card.dataset.name = p.name;

    const pts = rp.pts;
    const pos = rp._pos || (i + 1);
    const diff = pts - leaderPts;
    const diffStr = diff === 0 ? '—' : String(diff);

    // flaga i kod mistrza
    const champISO = ISO[p.champ] || '';
    const champCode = SHORT[p.champ] || (p.champ ? teamName(p.champ).substring(0,3).toUpperCase() : '—');
    const flagHTML = champISO
      ? `<img class="card-champ-flag" src="img/flags/${champISO}.png" alt="${teamName(p.champ)}">`
      : `<div class="card-champ-flag" style="background:rgba(255,255,255,.1)"></div>`;

    const photoSrc = PHOTOS[p.name] || '';
    const photoHTML = photoSrc
      ? `<img src="${photoSrc}" alt="${p.name}">`
      : `<div class="fifa-photo-placeholder">👤</div>`;

    card.innerHTML = `
      <div class="card-bg"></div>
      <div class="card-shine"></div>
      <div class="card-crystal"></div>
      <div class="card-ribbon"></div>
      <div class="card-border"></div>
      <div class="card-top">
        <div class="card-hso">${LANG==='en'?'WC':'MŚ'}</div>
        <div class="card-year">2026</div>
      </div>
      <div class="card-badge">
        ${flagHTML}
        <div class="card-champ-code">${champCode}</div>
      </div>
      <div class="fifa-photo">${photoHTML}</div>
      <div class="card-name">${p.name}</div>
      <div class="card-divider"></div>
      <div class="card-stats">
        <div class="card-stat"><div class="card-stat-val">${pos}</div><div class="card-stat-lbl">${tr('place')}</div></div>
        <div class="card-stat"><div class="card-stat-val">${pts}</div><div class="card-stat-lbl">${tr('points')}</div></div>
        <div class="card-stat"><div class="card-stat-val">${diffStr}</div><div class="card-stat-lbl">${tr('toLeader')}</div></div>
      </div>
      ${hasTips ? '<div class="card-check"></div>' : ''}`;

    card.addEventListener('click', () => {
      if (activePlayerCard === p.name) {
        closePlayerPanel();
      } else {
        openPlayerPanel(p);
        activePlayerCard = p.name;
        document.querySelectorAll('.fifa-card').forEach(c => {
          const isSelected = c.dataset.name === p.name;
          c.classList.toggle('selected', isSelected);
        });
      }
    });
    grid.appendChild(card);
  });
}

function openPlayerPanel(p){
  activePlayerCard = p.name;
  document.getElementById('pdpName').textContent = p.name;
  document.getElementById('pdpSub').textContent = '';
  document.getElementById('pdpChamp').textContent = p.champ ? teamName(p.champ) : '—';
  const stats=playerStats(p);
  document.getElementById('pdpStats').innerHTML=`
    <div class="pdp-stat"><strong>${stats.efficiency}%</strong><span>${tr('efficiency')}</span></div>
    <div class="pdp-stat"><strong>${stats.average}</strong><span>${tr('pointsPerMatch')}</span></div>
    <div class="pdp-stat"><strong>${stats.bestGroup}</strong><span>${tr('bestGroup')}</span></div>
    <div class="pdp-stat"><strong>${stats.streak}</strong><span>${tr('currentStreak')}</span></div>`;

  const cont = document.getElementById('pdpMatches');
  cont.innerHTML = '';

  // grupuj mecze według grup
  const grouped = {};
  MATCHES.forEach((m,i) => {
    if(!grouped[m.g]) grouped[m.g] = [];
    grouped[m.g].push({...m, idx:i});
  });

  Object.entries(grouped).forEach(([grp, ms]) => {
    const lbl = document.createElement('div');
    lbl.className = 'pdp-section-lbl';
    lbl.textContent = `${tr('group')} ${grp}`;
    cont.appendChild(lbl);

    ms.forEach(m => {
      const tip = p.tips[m.idx+1] || '—';
      const row = document.createElement('div');
      row.className = 'pdp-match';
      row.innerHTML = `
        <span class="pdp-date">${m.date}</span>
        <span class="pdp-teams">${flag(m.home)} ${disp(m.home)} – ${disp(m.away)} ${flag(m.away)}</span>
        <span class="pdp-tip">${tip}</span>`;
      cont.appendChild(row);
    });
  });

  const panel = document.getElementById('playerDetailPanel');
  panel.classList.add('open');
  panel.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function closePlayerPanel(){
  activePlayerCard = null;
  document.getElementById('playerDetailPanel').classList.remove('open');
  document.querySelectorAll('.fifa-card').forEach(c => c.classList.remove('selected'));
}

// ── Panel — dostęp tylko dla organizatora ─────────────────────────────────
if(false){
  const HASH = 'panel';
  // prosta suma kontrolna — nie wymaga btoa
  function hashPwd(s){ let h=0; for(let i=0;i<s.length;i++) h=(Math.imul(31,h)+s.charCodeAt(i))|0; return h; }
  const PWD_HASH = hashPwd('Żetakpowiem2405!#');

  function unlockPanel(){
    const entered = prompt('Podaj hasło dostępu do panelu:');
    if(entered === null) return;
    if(hashPwd(entered) === PWD_HASH){
      document.getElementById('adminTab').style.display = '';
      sessionStorage.setItem('hso_admin','1');
      // auto-przełącz do panelu
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      document.getElementById('adminTab').classList.add('active');
      ['gracze','mecze','ranking','admin'].forEach(t=>
        document.getElementById(`tab-${t}`).style.display=t==='admin'?'block':'none');
      // usuń hash z URL żeby nie podpowiadać
      history.replaceState(null,'',location.pathname);
    } else {
      alert('Nieprawidłowe hasło.');
    }
  }

  // Odblokuj jeśli sesja już autoryzowana
  if(sessionStorage.getItem('hso_admin')==='1'){
    document.getElementById('adminTab').style.display = '';
  }

  // Aktywuj po wejściu z #panel w URL
  if(location.hash === '#'+HASH){
    unlockPanel();
  }

  // Aktywuj skrótem Ctrl+Shift+P
  document.addEventListener('keydown', e=>{
    if(e.ctrlKey && e.shiftKey && e.key==='A'){
      e.preventDefault();
      if(sessionStorage.getItem('hso_admin')==='1'){
        document.getElementById('adminTab').style.display = '';
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
        document.getElementById('adminTab').classList.add('active');
        ['gracze','mecze','ranking','admin'].forEach(t=>
          document.getElementById(`tab-${t}`).style.display=t==='admin'?'block':'none');
      } else {
        unlockPanel();
      }
    }
  });
}
function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
  ['gracze','mecze','ranking'].forEach(t=>document.getElementById(`tab-${t}`).style.display=t===tab?'block':'none');
}
