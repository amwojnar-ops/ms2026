name: Aktualizacja wynikow football-data.org

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  update-results:
    runs-on: ubuntu-latest
    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v4

      - name: Pobierz wyniki z API
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN || secrets.FOOTBALL_DATA_API_KEY }}
        run: node scripts/update-football-data.mjs

      - name: Zapisz zmiany
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/football-data.json
          git diff --cached --quiet || git commit -m "Aktualizuj wyniki meczow"
          git push
