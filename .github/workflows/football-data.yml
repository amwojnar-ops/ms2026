name: Aktualizacja wynikow football-data.org

on:
  workflow_dispatch:
  schedule:
    - cron: "7/15 * * * *"

permissions:
  contents: write

concurrency:
  group: football-data-live-monitor
  cancel-in-progress: false

jobs:
  update-results:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v4

      - name: Monitoruj trwajacy mecz
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN || secrets.FOOTBALL_DATA_API_KEY }}
        run: |
          echo "Wyzwolenie: ${{ github.event_name }}"
          echo "Plan: ${{ github.event.schedule }}"
          echo "Start UTC: $(date -u '+%Y-%m-%d %H:%M:%S')"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for attempt in $(seq 1 48); do
            node scripts/update-football-data.mjs
            if [ -f data/.football-data-waiting ]; then
              wait_seconds=$(cat data/.football-data-waiting)
              rm -f data/.football-data-waiting
              echo "Mecz jeszcze sie nie rozpoczal. Czekam ${wait_seconds} s."
              sleep "$wait_seconds"
              continue
            fi
            git add data/football-data.json
            if ! git diff --cached --quiet; then
              git commit -m "Aktualizuj wyniki meczow"
              git push
            fi
            if [ ! -f data/.football-data-polling ]; then
              echo "Brak trwajacego meczu albo API zwrocilo FINISHED."
              break
            fi
            echo "Kolejna kontrola za 5 minut."
            sleep 300
            git pull --rebase
          done
          rm -f data/.football-data-polling data/.football-data-waiting
