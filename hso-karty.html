<meta name="description" content="Pamiątkowa karta gracza Loży Ekspertów MŚ 2026 gotowa do druku.">
<link rel="apple-touch-icon" sizes="180x180" href="img/hso-icon-180.png">
<link rel="icon" type="image/png" sizes="32x32" href="img/hso-icon-32.png">

<body>
<main class="souvenir-wrap">
  <header class="souvenir-hero">
    <div>
      <p class="eyebrow">LOŻA EKSPERTÓW · MŚ 2026</p>
      <h1>Karta gracza</h1>
      <p class="lead">Pamiątkowa karta z miejscem, punktami i najważniejszymi statystykami. Wybierz osobę, wydrukuj albo zapisz do PDF.</p>
    </div>
    <div class="souvenir-actions">
      <a class="ghost-btn" href="hso.html">← Wróć</a>
      <button class="print-btn" id="printCard" type="button">Drukuj kartę</button>
    </div>
  </header>

  <section class="control-card">
    <div class="player-picker">
      <span>Gracz</span>
      <div class="custom-select" id="playerSelectWrap">
        <button class="custom-select-button" id="playerSelectButton" type="button" aria-haspopup="listbox" aria-expanded="false">
          <span id="playerSelectLabel">Wybierz gracza</span>
          <span class="custom-select-arrow" aria-hidden="true">⌄</span>
        </button>
        <div class="custom-select-menu" id="playerSelectMenu" role="listbox" hidden></div>
      </div>
    </div>
    <p id="cardNote">Karta korzysta z aktualnego rankingu i zakończonych meczów.</p>
  </section>

  <section class="souvenir-stage">
    <article class="memory-card" id="memoryCard" aria-live="polite"></article>
  </section>
</main>

<script>window.HSO_CONFIG={mode:'cards'};</script>
